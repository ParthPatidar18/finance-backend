# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=ParthPatidar123

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for dev/testing)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Config
app.jwt.secret=ZorvynFinanceSecretKey2026SuperLongSecretKeyForHS256Algorithm
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.zorvyn=INFO
logging.level.org.springframework.security=WARN
